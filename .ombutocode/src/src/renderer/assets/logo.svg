<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer rounded square -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#logoGradient)"/>
  
  <!-- Code brackets and J letter design -->
  <!-- Left bracket -->
  <path d="M8 10 L8 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M8 10 L12 10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M8 22 L12 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Right bracket -->
  <path d="M24 10 L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 10 L24 10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 22 L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- J in the center -->
  <path d="M14 8 L14 20 Q14 24 17 24 L18 24" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="19" cy="8" r="1.5" fill="white"/>
</svg>
