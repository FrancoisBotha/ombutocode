<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="'Segoe UI', system-ui, sans-serif">
  <style>
    .bg          { fill: #F7F8FA; }
    .surface     { fill: #FFFFFF; }
    .surface-hov { fill: #F0F3F7; }
    .border      { fill: none; stroke: #E1E5EB; stroke-width: 1; }
    .primary     { fill: #4A90E2; }
    .success     { fill: #2FA96A; }
    .warning     { fill: #D98B1F; }
    .error       { fill: #D14545; }
    .disabled    { fill: #9CA3AF; }

    .h1          { font-size: 22px; font-weight: 700; fill: #1F2430; }
    .h3          { font-size: 14px; font-weight: 600; fill: #1F2430; }
    .body        { font-size: 13px; fill: #1F2430; }
    .muted       { font-size: 13px; fill: #6B7280; }
    .small       { font-size: 11px; fill: #9CA3AF; }
    .col-head    { font-size: 11px; font-weight: 600; fill: #9CA3AF; letter-spacing: 0.5px; }
    .pill-text   { font-size: 11px; font-weight: 600; fill: #FFFFFF; }
    .btn-text    { font-size: 13px; font-weight: 600; fill: #FFFFFF; }
    .link        { font-size: 12px; font-weight: 500; fill: #4A90E2; cursor: pointer; }
    .link-danger { font-size: 12px; font-weight: 500; fill: #D14545; }
    .nav         { font-size: 13px; fill: #1F2430; }
    .nav-active  { font-size: 13px; font-weight: 600; fill: #4A90E2; }
    .brand       { font-size: 15px; font-weight: 700; fill: #1F2430; }
  </style>

  <rect width="1440" height="900" class="bg"/>

  <!-- SIDEBAR 200px -->
  <g>
    <rect x="0" y="0" width="200" height="900" class="surface"/>
    <line x1="200" y1="0" x2="200" y2="900" stroke="#E1E5EB"/>

    <g transform="translate(20, 28)">
      <rect x="0" y="0" width="22" height="22" rx="5" class="primary"/>
      <text x="11" y="16" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">D</text>
      <text x="32" y="16" class="brand">DropSync</text>
    </g>

    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="200" height="36" fill="transparent"/>
      <text x="36" y="23" class="nav">Dashboard</text>

      <rect x="0" y="44" width="200" height="36" class="surface-hov"/>
      <rect x="0" y="44" width="3" height="36" class="primary"/>
      <text x="36" y="67" class="nav-active">Backup Jobs</text>

      <rect x="0" y="88" width="200" height="36" fill="transparent"/>
      <text x="36" y="111" class="nav">Backup Logs</text>

      <rect x="0" y="132" width="200" height="36" fill="transparent"/>
      <text x="36" y="155" class="nav">Settings</text>
    </g>

    <g transform="translate(20, 840)">
      <circle cx="5" cy="5" r="4" class="success"/>
      <text x="16" y="9" class="small">Dropbox connected</text>
    </g>
  </g>

  <!-- CONTENT -->
  <g transform="translate(224, 24)">
    <text x="0" y="22" class="h1">Backup Jobs</text>
    <text x="0" y="44" class="muted">6 jobs · 5 enabled · synced 2 min ago</text>

    <g transform="translate(1060, 4)">
      <rect x="0" y="0" width="120" height="34" rx="6" class="primary"/>
      <text x="60" y="22" class="btn-text" text-anchor="middle">+ Create Job</text>
    </g>

    <!-- TABLE -->
    <g transform="translate(0, 72)">
      <rect x="0" y="0" width="1192" height="780" rx="8" class="surface"/>
      <rect x="0" y="0" width="1192" height="780" rx="8" class="border"/>

      <!-- Header -->
      <rect x="1" y="1" width="1190" height="36" rx="8" fill="#F7F8FA"/>
      <rect x="1" y="20" width="1190" height="17" fill="#F7F8FA"/>
      <line x1="0" y1="37" x2="1192" y2="37" stroke="#E1E5EB"/>

      <text x="16" y="24" class="col-head">JOB NAME</text>
      <text x="200" y="24" class="col-head">SOURCE</text>
      <text x="420" y="24" class="col-head">TARGET</text>
      <text x="600" y="24" class="col-head">INTERVAL</text>
      <text x="700" y="24" class="col-head">STATUS</text>
      <text x="810" y="24" class="col-head">NEXT RUN</text>
      <text x="930" y="24" class="col-head">LAST RUN</text>
      <text x="1100" y="24" class="col-head">ACTIONS</text>

      <!-- Row 1: Documents - Completed -->
      <g transform="translate(0, 37)">
        <rect x="0" y="0" width="1192" height="64" class="surface"/>
        <line x1="16" y1="64" x2="1176" y2="64" stroke="#F0F3F7"/>
        <text x="16" y="28" class="h3">Documents</text>
        <text x="16" y="48" class="small">8,412 files · 2.4 GB</text>
        <text x="200" y="28" class="body">C:\Users\…\Documents</text>
        <text x="420" y="28" class="body">/Backups/Documents</text>
        <text x="600" y="28" class="body">Hourly</text>
        <g transform="translate(700, 16)">
          <rect x="0" y="0" width="78" height="20" rx="10" class="success"/>
          <text x="39" y="14" class="pill-text" text-anchor="middle">Completed</text>
        </g>
        <text x="810" y="28" class="body">in 47 min</text>
        <text x="810" y="48" class="small">14:00 today</text>
        <text x="930" y="28" class="body">13:00 today</text>
        <text x="930" y="48" class="small">12 changes · 4.2s</text>
        <text x="1100" y="28" class="link">Edit</text>
        <text x="1134" y="28" class="link">Run</text>
        <text x="1162" y="28" class="link-danger">×</text>
      </g>

      <!-- Row 2: Photos - Running -->
      <g transform="translate(0, 101)">
        <rect x="0" y="0" width="1192" height="64" fill="#F7FAFF"/>
        <line x1="16" y1="64" x2="1176" y2="64" stroke="#F0F3F7"/>
        <text x="16" y="28" class="h3">Photos 2026</text>
        <text x="16" y="48" class="small">3,221 files · 18.7 GB</text>
        <text x="200" y="28" class="body">D:\Media\Photos\2026</text>
        <text x="420" y="28" class="body">/Backups/Photos</text>
        <text x="600" y="28" class="body">Daily 02:00</text>
        <g transform="translate(700, 16)">
          <rect x="0" y="0" width="66" height="20" rx="10" class="primary"/>
          <text x="33" y="14" class="pill-text" text-anchor="middle">Running</text>
        </g>
        <text x="810" y="28" class="muted">—</text>
        <text x="810" y="48" class="small">in progress</text>
        <text x="930" y="28" class="body">02:00 today</text>
        <text x="930" y="48" class="small">61% · 1.2 / 2.0 GB</text>
        <text x="1100" y="28" class="link">Edit</text>
        <text x="1134" y="28" class="link-danger">Stop</text>
      </g>

      <!-- Row 3: Source Code - Failed -->
      <g transform="translate(0, 165)">
        <rect x="0" y="0" width="1192" height="64" class="surface"/>
        <line x1="16" y1="64" x2="1176" y2="64" stroke="#F0F3F7"/>
        <text x="16" y="28" class="h3">Source Code</text>
        <text x="16" y="48" class="small">42,108 files · 5.1 GB</text>
        <text x="200" y="28" class="body">C:\dev\build</text>
        <text x="420" y="28" class="body">/Backups/dev</text>
        <text x="600" y="28" class="body">Every 6h</text>
        <g transform="translate(700, 16)">
          <rect x="0" y="0" width="54" height="20" rx="10" class="error"/>
          <text x="27" y="14" class="pill-text" text-anchor="middle">Failed</text>
        </g>
        <text x="810" y="28" class="body">retry 18:00</text>
        <text x="810" y="48" class="small">auto-retry x2</text>
        <text x="930" y="28" class="body">12:00 today</text>
        <text x="930" y="48" font-size="11" fill="#D14545">auth_token_expired</text>
        <text x="1100" y="28" class="link">Edit</text>
        <text x="1134" y="28" class="link">Run</text>
        <text x="1162" y="28" class="link-danger">×</text>
      </g>

      <!-- Row 4: Music - Completed -->
      <g transform="translate(0, 229)">
        <rect x="0" y="0" width="1192" height="64" fill="#F7FAFF"/>
        <line x1="16" y1="64" x2="1176" y2="64" stroke="#F0F3F7"/>
        <text x="16" y="28" class="h3">Music Library</text>
        <text x="16" y="48" class="small">14,902 files · 62.3 GB</text>
        <text x="200" y="28" class="body">E:\Music\FLAC</text>
        <text x="420" y="28" class="body">/Backups/Music</text>
        <text x="600" y="28" class="body">Weekly Sun</text>
        <g transform="translate(700, 16)">
          <rect x="0" y="0" width="78" height="20" rx="10" class="success"/>
          <text x="39" y="14" class="pill-text" text-anchor="middle">Completed</text>
        </g>
        <text x="810" y="28" class="body">Sun 03:00</text>
        <text x="810" y="48" class="small">in 3 days</text>
        <text x="930" y="28" class="body">Sun 03:00</text>
        <text x="930" y="48" class="small">no changes · 1.1s</text>
        <text x="1100" y="28" class="link">Edit</text>
        <text x="1134" y="28" class="link">Run</text>
        <text x="1162" y="28" class="link-danger">×</text>
      </g>

      <!-- Row 5: Game Saves - Skipped -->
      <g transform="translate(0, 293)">
        <rect x="0" y="0" width="1192" height="64" class="surface"/>
        <line x1="16" y1="64" x2="1176" y2="64" stroke="#F0F3F7"/>
        <text x="16" y="28" class="h3">Game Saves</text>
        <text x="16" y="48" class="small">1,884 files · 412 MB</text>
        <text x="200" y="28" class="body">C:\Users\…\Saved Games</text>
        <text x="420" y="28" class="body">/Backups/Saves</text>
        <text x="600" y="28" class="body">Hourly</text>
        <g transform="translate(700, 16)">
          <rect x="0" y="0" width="62" height="20" rx="10" class="warning"/>
          <text x="31" y="14" class="pill-text" text-anchor="middle">Skipped</text>
        </g>
        <text x="810" y="28" class="body">in 47 min</text>
        <text x="810" y="48" class="small">14:00 today</text>
        <text x="930" y="28" class="body">13:00 today</text>
        <text x="930" y="48" font-size="11" fill="#D98B1F">14 files locked</text>
        <text x="1100" y="28" class="link">Edit</text>
        <text x="1134" y="28" class="link">Run</text>
        <text x="1162" y="28" class="link-danger">×</text>
      </g>

      <!-- Row 6: Old Laptop - Disabled -->
      <g transform="translate(0, 357)">
        <rect x="0" y="0" width="1192" height="64" fill="#F7FAFF"/>
        <text x="16" y="28" font-size="14" font-weight="600" fill="#9CA3AF">Old Laptop Backup</text>
        <text x="16" y="48" class="small">22,041 files · 8.9 GB</text>
        <text x="200" y="28" class="muted">F:\Archive\Laptop2023</text>
        <text x="420" y="28" class="muted">/Backups/Archive</text>
        <text x="600" y="28" class="muted">Daily 04:00</text>
        <g transform="translate(700, 16)">
          <rect x="0" y="0" width="66" height="20" rx="10" class="disabled"/>
          <text x="33" y="14" class="pill-text" text-anchor="middle">Disabled</text>
        </g>
        <text x="810" y="28" class="muted">—</text>
        <text x="930" y="28" class="muted">2026-03-28</text>
        <text x="930" y="48" class="small">paused by user</text>
        <text x="1100" y="28" class="link">Edit</text>
        <text x="1134" y="28" class="link">Enable</text>
      </g>

      <!-- Footer -->
      <g transform="translate(0, 440)">
        <line x1="0" y1="0" x2="1192" y2="0" stroke="#E1E5EB"/>
        <text x="16" y="24" class="small">Showing 6 of 6 jobs</text>
        <circle cx="1100" cy="18" r="4" class="success"/>
        <text x="1112" y="22" class="small">Live updates</text>
      </g>
    </g>
  </g>
</svg>
