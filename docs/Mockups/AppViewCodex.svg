<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Inter, -apple-system, Segoe UI, system-ui, sans-serif">
  <title>DropSync App Shell Mockup</title>
  <desc>Light theme Electron desktop app shell mockup for DropSync with sidebar navigation, Jobs placeholder route, Logs route, and IPC status content.</desc>

  <!-- Palette from docs/Style Guide/StyleGuide.md:
       Primary #4A90E2, Primary hover #3A7BC8, Background #F7F8FA,
       Surface #FFFFFF, Surface hover #F0F3F7, Border #E1E5EB,
       Text #1F2430, Muted #6B7280, Success #2FA96A,
       Warning #D98B1F, Error #D14545. -->

  <rect width="1280" height="800" fill="#F7F8FA"/>

  <!-- Windows app frame -->
  <rect x="32" y="28" width="1216" height="744" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
  <rect x="33" y="29" width="1214" height="39" rx="6" fill="#FFFFFF"/>
  <line x1="32" y1="68" x2="1248" y2="68" stroke="#E1E5EB"/>

  <g transform="translate(56 42)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#4A90E2"/>
    <path d="M4 7.5 L8 4 L12 7.5 L8 11 Z" fill="#FFFFFF"/>
    <text x="28" y="13" font-size="14" font-weight="600" fill="#1F2430">DropSync</text>
    <text x="101" y="13" font-size="12" font-weight="400" fill="#6B7280">App Shell</text>
  </g>

  <g transform="translate(1160 42)" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round">
    <line x1="0" y1="8" x2="12" y2="8"/>
    <rect x="32" y="2" width="12" height="12" rx="1" fill="none"/>
    <line x1="68" y1="3" x2="80" y2="15"/>
    <line x1="80" y1="3" x2="68" y2="15"/>
  </g>

  <!-- Sidebar -->
  <rect x="32" y="68" width="220" height="704" fill="#FFFFFF"/>
  <line x1="252" y1="68" x2="252" y2="772" stroke="#E1E5EB"/>

  <g transform="translate(56 96)">
    <text x="0" y="0" font-size="12" font-weight="400" fill="#6B7280">Navigation</text>

    <g transform="translate(-16 22)">
      <rect x="0" y="0" width="188" height="44" rx="6" fill="#FFFFFF"/>
      <rect x="0" y="0" width="3" height="44" rx="1.5" fill="#4A90E2"/>
      <g transform="translate(16 14)" stroke="#4A90E2" stroke-width="1.6" fill="none" stroke-linejoin="round">
        <rect x="1" y="3" width="14" height="11" rx="2"/>
        <path d="M5 3 L6 1 L10 1 L11 3"/>
      </g>
      <text x="44" y="28" font-size="14" font-weight="600" fill="#4A90E2">Jobs</text>
    </g>

    <g transform="translate(-16 74)">
      <rect x="0" y="0" width="188" height="44" rx="6" fill="#FFFFFF"/>
      <g transform="translate(16 14)" stroke="#6B7280" stroke-width="1.6" fill="none" stroke-linecap="round">
        <line x1="1" y1="2" x2="15" y2="2"/>
        <line x1="1" y1="8" x2="12" y2="8"/>
        <line x1="1" y1="14" x2="15" y2="14"/>
      </g>
      <text x="44" y="28" font-size="14" font-weight="400" fill="#1F2430">Logs</text>
    </g>

    <line x1="-16" y1="154" x2="172" y2="154" stroke="#E1E5EB"/>

    <text x="0" y="186" font-size="12" font-weight="400" fill="#6B7280">Runtime</text>
    <g transform="translate(-16 208)">
      <rect x="0" y="0" width="188" height="72" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <circle cx="20" cy="23" r="5" fill="#2FA96A"/>
      <text x="36" y="28" font-size="14" font-weight="600" fill="#1F2430">Renderer ready</text>
      <text x="16" y="54" font-size="12" font-weight="400" fill="#6B7280">Vite dev server</text>
    </g>

    <g transform="translate(-16 296)">
      <rect x="0" y="0" width="188" height="72" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <circle cx="20" cy="23" r="5" fill="#4A90E2"/>
      <text x="36" y="28" font-size="14" font-weight="600" fill="#1F2430">IPC bridge</text>
      <text x="16" y="54" font-size="12" font-weight="400" fill="#6B7280">contextBridge API</text>
    </g>
  </g>

  <g transform="translate(56 706)">
    <line x1="-16" y1="-24" x2="172" y2="-24" stroke="#E1E5EB"/>
    <text x="0" y="0" font-size="12" font-weight="400" fill="#6B7280">Local content only</text>
    <text x="0" y="22" font-size="12" font-weight="400" fill="#6B7280">nodeIntegration: false</text>
  </g>

  <!-- Main content -->
  <g transform="translate(276 92)">
    <g>
      <text x="0" y="26" font-size="24" font-weight="700" fill="#1F2430">Jobs</text>
      <text x="0" y="56" font-size="14" font-weight="400" fill="#6B7280">Placeholder route for the DropSync desktop shell.</text>
    </g>

    <g transform="translate(756 0)">
      <rect x="0" y="0" width="112" height="36" rx="6" fill="#4A90E2"/>
      <text x="56" y="23" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Run Check</text>
      <rect x="128" y="0" width="92" height="36" rx="6" fill="#FFFFFF" stroke="#4A90E2"/>
      <text x="174" y="23" font-size="14" font-weight="600" fill="#4A90E2" text-anchor="middle">Settings</text>
    </g>

    <!-- Status cards -->
    <g transform="translate(0 88)">
      <rect x="0" y="0" width="300" height="112" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <text x="16" y="30" font-size="12" font-weight="400" fill="#6B7280">Window</text>
      <text x="16" y="64" font-size="19" font-weight="600" fill="#1F2430">BrowserWindow open</text>
      <rect x="16" y="78" width="82" height="22" rx="11" fill="#2FA96A"/>
      <text x="57" y="94" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Ready</text>

      <rect x="324" y="0" width="300" height="112" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <text x="340" y="30" font-size="12" font-weight="400" fill="#6B7280">Security</text>
      <text x="340" y="64" font-size="19" font-weight="600" fill="#1F2430">Hardened renderer</text>
      <text x="340" y="94" font-size="12" font-weight="400" fill="#6B7280">No direct Node.js access</text>

      <rect x="648" y="0" width="300" height="112" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <text x="664" y="30" font-size="12" font-weight="400" fill="#6B7280">IPC</text>
      <text x="664" y="64" font-size="19" font-weight="600" fill="#1F2430">app:getVersion</text>
      <text x="664" y="94" font-size="12" font-weight="400" fill="#6B7280">Round trip succeeded</text>
    </g>

    <!-- Primary section -->
    <g transform="translate(0 232)">
      <rect x="0" y="0" width="948" height="252" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <text x="16" y="34" font-size="19" font-weight="600" fill="#1F2430">App shell routes</text>
      <text x="16" y="62" font-size="14" font-weight="400" fill="#6B7280">Navigation is in place while backup features are added in later epics.</text>

      <g transform="translate(16 88)">
        <rect x="0" y="0" width="916" height="40" fill="#F0F3F7"/>
        <text x="16" y="25" font-size="12" font-weight="600" fill="#6B7280">Route</text>
        <text x="280" y="25" font-size="12" font-weight="600" fill="#6B7280">Purpose</text>
        <text x="744" y="25" font-size="12" font-weight="600" fill="#6B7280">Status</text>

        <rect x="0" y="40" width="916" height="56" fill="#FFFFFF"/>
        <line x1="0" y1="96" x2="916" y2="96" stroke="#E1E5EB"/>
        <text x="16" y="74" font-size="14" font-weight="600" fill="#1F2430">Jobs</text>
        <text x="280" y="74" font-size="14" font-weight="400" fill="#1F2430">Main placeholder for future backup job management</text>
        <rect x="744" y="56" width="92" height="24" rx="12" fill="#2FA96A"/>
        <text x="790" y="73" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Reachable</text>

        <rect x="0" y="96" width="916" height="56" fill="#FFFFFF"/>
        <line x1="0" y1="152" x2="916" y2="152" stroke="#E1E5EB"/>
        <text x="16" y="130" font-size="14" font-weight="600" fill="#1F2430">Logs</text>
        <text x="280" y="130" font-size="14" font-weight="400" fill="#1F2430">Full-width table view for backup log records</text>
        <rect x="744" y="112" width="92" height="24" rx="12" fill="#2FA96A"/>
        <text x="790" y="129" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Reachable</text>
      </g>
    </g>

    <!-- Bottom panels -->
    <g transform="translate(0 508)">
      <rect x="0" y="0" width="462" height="132" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <text x="16" y="32" font-size="16" font-weight="600" fill="#1F2430">IPC response</text>
      <text x="16" y="62" font-size="14" font-weight="400" fill="#6B7280">Command</text>
      <text x="120" y="62" font-size="14" font-weight="400" fill="#1F2430">app:getVersion</text>
      <text x="16" y="92" font-size="14" font-weight="400" fill="#6B7280">Result</text>
      <rect x="120" y="73" width="88" height="24" rx="12" fill="#4A90E2"/>
      <text x="164" y="90" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">v0.1.0-dev</text>

      <rect x="486" y="0" width="462" height="132" rx="6" fill="#FFFFFF" stroke="#E1E5EB"/>
      <text x="502" y="32" font-size="16" font-weight="600" fill="#1F2430">Shell checklist</text>
      <circle cx="510" cy="58" r="5" fill="#2FA96A"/>
      <text x="526" y="63" font-size="14" font-weight="400" fill="#1F2430">Loads local renderer content</text>
      <circle cx="510" cy="88" r="5" fill="#2FA96A"/>
      <text x="526" y="93" font-size="14" font-weight="400" fill="#1F2430">Typed bridge exposed through preload</text>
    </g>
  </g>
</svg>
